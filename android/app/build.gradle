plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.counter.flutter_app"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.counter.flutter_app"
        minSdk = 26
        targetSdk = 35
        versionCode = 1
        versionName = "1.0.0"
    }

    signingConfigs {
        if (System.getenv("CI") == "true") {
            def keystoreFile = rootProject.file('app/keystore.jks')
            if (keystoreFile.exists()) {
                release {
                    keyAlias = System.getenv("KEY_ALIAS") ?: keystoreProperties['keyAlias']
                    keyPassword = System.getenv("KEY_PASSWORD") ?: keystoreProperties['keyPassword']
                    storeFile = keystoreFile
                    storePassword = System.getenv("KEYSTORE_PASSWORD") ?: keystoreProperties['storePassword']
                }
            }
        } else if (keystorePropertiesFile.exists()) {
            def storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            if (storeFile != null && storeFile.exists()) {
                release {
                    keyAlias = keystoreProperties['keyAlias']
                    keyPassword = keystoreProperties['keyPassword']
                    storeFile = storeFile
                    storePassword = keystoreProperties['storePassword']
                }
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.findByName('release') ?: signingConfigs.debug
            minifyEnabled = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
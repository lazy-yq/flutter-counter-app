# filename: .github/workflows/build.yml
# GitHub Actions 工作流 - 自动构建签名 Release APK
#
# 触发条件：
#   1. 推送代码到 main 分支
#   2. 手动触发 (workflow_dispatch)
#
# 需要的 GitHub Secrets：
#   KEYSTORE_BASE64  - keystore.jks 文件的 Base64 编码
#   KEYSTORE_PASSWORD - keystore 密码
#   KEY_ALIAS         - 签名密钥别名
#   KEY_PASSWORD      - 签名密钥密码

name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: 构建 Android APK
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出代码
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 步骤 2：安装 Flutter（3.x 最新稳定版）
      - name: 安装 Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          channel: 'stable'
          cache: true

      # 步骤 3：验证 Flutter 环境
      - name: 验证 Flutter 环境
        run: flutter doctor -v

      # 步骤 4：设置 Java 17 环境
      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 步骤 5：安装 Flutter 依赖
      - name: 安装依赖
        run: flutter pub get

      # 步骤 6：从 GitHub Secrets 解码 keystore.jks 签名文件
      - name: 解码签名密钥文件
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "keystore.jks 解码完成"
          else
            echo "警告：未设置 KEYSTORE_BASE64 secret，将使用 debug 签名"
          fi

      # 步骤 7：动态生成 key.properties 签名配置
      - name: 生成签名配置 key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          storeFile=../app/keystore.jks
          EOF
          echo "key.properties 生成完成"

      # 步骤 8：设置 CI 环境变量标记
      - name: 设置 CI 环境变量
        run: echo "CI=true" >> $GITHUB_ENV

      # 步骤 9：构建 Release APK
      - name: 构建 Release APK
        run: flutter build apk --release --target-platform android-arm64

      # 步骤 10：上传 APK 作为构建产物
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30  # 保留 30 天